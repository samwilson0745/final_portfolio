<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <text x="16" y="23" font-family="'Helvetica Neue', Helvetica, sans-serif" font-size="13" font-weight="100" fill="url(#textGrad)" text-anchor="middle" letter-spacing="1" filter="url(#glow)" shape-rendering="crispEdges">SM</text>
</svg>
